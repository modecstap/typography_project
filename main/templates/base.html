{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Типография{% endblock %}</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">

    <!-- Favicon -->
    <link rel="icon" href="{% static 'favicon.ico' %}" type="image/x-icon">
    <link rel="shortcut icon" href="{% static 'favicon.ico' %}" type="image/x-icon">
</head>
<body class="d-flex flex-column min-vh-100">
    {% include "includes/header.html" %}

    <main class="flex-grow-1" style="min-height: 70vh;">
        <div class="container my-4">
            {% block content %}
                <!-- По умолчанию контент занимает всю доступную высоту -->
                <div class="h-100 d-flex align-items-center justify-content-center">
                    <div class="text-center">
                        {% block empty_content %}
                            <!-- Контент по умолчанию, если страница пустая -->
                            <h1 class="display-4">Добро пожаловать</h1>
                            <p class="lead">Используйте это пространство для вашего контента</p>
                        {% endblock %}
                    </div>
                </div>
            {% endblock %}
        </div>
    </main>

    {% include "includes/footer.html" %}
</body>
</html>
