<div class="modal fade" id="reviewModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <form method="post" id="reviewForm" action="">
                {% csrf_token %}
                <div class="modal-header">
                    <h5 class="modal-title">
                        Оставить отзыв
                    </h5>
                    <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                    </button>
                </div>
                <div class="modal-body">
                    <p>
                        <strong id="reviewProductTitle"></strong>
                    </p>
                    <div class="mb-3">
                        <label>Оценка</label>
                        <input
                            type="number"
                            name="rating"
                            class="form-control"
                            min="1"
                            max="5"
                            required
                        >
                    </div>
                    <div class="mb-3">
                        <label>Комментарий</label>
                        <textarea
                            name="text"
                            class="form-control"
                            rows="3"
                            required
                        ></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button
                        type="button"
                        class="btn btn-secondary"
                        data-bs-dismiss="modal"
                    >
                        Отмена
                    </button>
                    <button
                        type="submit"
                        class="btn btn-primary"
                    >
                        Отправить
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
const reviewModal = document.getElementById('reviewModal');
const reviewForm = document.getElementById('reviewForm');
const productTitle =document.getElementById('reviewProductTitle');

reviewModal.addEventListener(
    'show.bs.modal',
    function (event)
    {
        const button = event.relatedTarget;
        const itemId = button.getAttribute('data-item-id');
        const title = button.getAttribute('data-product-title');
        productTitle.textContent = title;
        const url = reviewUrlTemplate.replace("0", itemId);
        reviewForm.action = url;
    }
);
</script>
